<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sam'Sou">
<meta name="theme-color" content="#0f0f11">
<title>Sam'Sou — Gestion Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500;700&display=swap');
:root{--bg:#0f0f11;--surface:#1a1a1f;--surface2:#222228;--border:rgba(255,255,255,0.07);--text:#f0f0f2;--muted:#888896;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--radius:16px;--nav-h:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;}
.pages{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.page{display:none;} .page.active{display:block;}

/* SPLASH & LOCK */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}
.splash-logo{width:140px;height:140px;border-radius:30px;object-fit:cover;margin-bottom:20px;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
#lock{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;}
.lock-dots{display:flex;gap:15px;margin:30px 0;}
.lock-dot{width:14px;height:14px;border-radius:50%;border:2px solid #444;}
.lock-dot.filled{background:var(--blue);border-color:var(--blue);box-shadow:0 0 10px rgba(96,165,250,0.5);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;width:280px;}
.num-btn{aspect-ratio:1;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.num-btn:active{background:#333;}

/* CARTES & FORMULAIRES */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:15px;}
.section-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:20px;}
input, select{background:var(--surface2);border:1px solid var(--border);color:white;padding:12px;border-radius:10px;font-size:14px;outline:none;min-width:0;font-family:'DM Sans',sans-serif;}

/* CORRECTION PIXEL 10 PRO : CHARGES (La fameuse bulle) */
.charges-card{background:var(--surface);border-left:4px solid var(--red);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;height:auto;}
.charges-amount{font-size:32px;font-family:'DM Mono';font-weight:700;color:var(--red);margin-bottom:10px;}
.charges-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.charges-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;}
.charges-val{font-family:'DM Mono';font-weight:600;font-size:14px;}
.charges-add{display:flex;gap:8px;margin-top:15px;align-items:center;width:100%;}
.charges-add input[type="text"]{flex:2;}
.charges-add input[type="number"]{flex:1;}
.btn-add{background:var(--red);color:white;border:none;border-radius:10px;width:42px;height:42px;font-weight:bold;font-size:20px;flex-shrink:0;}

/* NAV */
.nav{position:fixed;bottom:0;width:100%;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:11px;background:none;border:none;font-family:'DM Sans',sans-serif;}
.nav-btn.active{color:var(--blue);}
</style>
</head>
<body>

<div id="splash">
  <img src="Gemini_Generated_Image_fyrz79fyrz79fyrz-2.jpg" class="splash-logo" alt="Logo">
  <h2>SAM'SOU</h2>
</div>

<div id="lock">
  <p style="margin-bottom:10px; font-weight:600;">Code de sécurité</p>
  <div class="lock-dots">
    <div class="lock-dot" id="ld0"></div><div class="lock-dot" id="ld1"></div><div class="lock-dot" id="ld2"></div>
    <div class="lock-dot" id="ld3"></div><div class="lock-dot" id="ld4"></div><div class="lock-dot" id="ld5"></div>
  </div>
  <div class="numpad">
    <div class="num-btn" onclick="numPress('1')">1</div><div class="num-btn" onclick="numPress('2')">2</div><div class="num-btn" onclick="numPress('3')">3</div>
    <div class="num-btn" onclick="numPress('4')">4</div><div class="num-btn" onclick="numPress('5')">5</div><div class="num-btn" onclick="numPress('6')">6</div>
    <div class="num-btn" onclick="numPress('7')">7</div><div class="num-btn" onclick="numPress('8')">8</div><div class="num-btn" onclick="numPress('9')">9</div>
    <div style="visibility:hidden"></div><div class="num-btn" onclick="numPress('0')">0</div><div class="num-btn" onclick="numDel()">⌫</div>
  </div>
</div>

<div class="app">
  <div class="pages">
    
    <div id="page-dash" class="page active">
      <div class="card" style="text-align:center">
        <p class="section-label" style="margin-top:0">Solde Total</p>
        <div style="font-size:36px;font-family:'DM Mono';font-weight:700" id="total-solde">2 450,00 €</div>
      </div>

      <div class="card" style="border-left:4px solid var(--blue)">
        <p style="font-weight:600;margin-bottom:12px">Saisir une opération</p>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <select id="op-type" style="flex:1">
            <option value="out">➖ Dépense</option>
            <option value="in">➕ Remboursement</option>
          </select>
          <input type="number" id="op-val" placeholder="€" style="width:90px">
        </div>
        <button onclick="ajouterOperation()" style="width:100%;background:var(--blue);color:white;border:none;padding:12px;border-radius:10px;font-weight:bold">Valider l'opération</button>
      </div>
    </div>

    <div id="page-rem" class="page">
      <p class="section-label">Charges Fixes</p>
      <div class="charges-card">
        <p style="font-size:12px;color:var(--muted)">Total mensuel</p>
        <div class="charges-amount">1 150,00 €</div>
        <div class="charges-item">
          <span class="charges-name">Loyer</span>
          <span class="charges-val">850 €</span>
        </div>
        <div class="charges-add">
          <input type="text" placeholder="Nom">
          <input type="number" placeholder="€">
          <button class="btn-add">+</button>
        </div>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('dash')">
      <span style="font-size:20px;margin-bottom:4px">🏠</span>Accueil
    </button>
    <button class="nav-btn" onclick="showPage('rem')">
      <span style="font-size:20px;margin-bottom:4px">📉</span>Charges
    </button>
  </nav>
</div>

<script>
// CODE PIN (Défini sur 320132)
let lockInput = '';
const PIN = '320132';

function numPress(n) {
  if (lockInput.length < 6) {
    lockInput += n;
    updateDots();
    if (lockInput.length === 6) {
      setTimeout(() => {
        if (lockInput === PIN) {
          document.getElementById('lock').style.display = 'none';
        } else {
          lockInput = '';
          updateDots();
          alert("Code incorrect !");
        }
      }, 200);
    }
  }
}

function numDel() {
  lockInput = lockInput.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 6; i++) {
    document.getElementById('ld' + i).classList.toggle('filled', i < lockInput.length);
  }
}

// NAVIGATION
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// LOGIQUE REMBOURSEMENT / DÉPENSE
let solde = 2450;
function ajouterOperation() {
  let type = document.getElementById('op-type').value;
  let val = parseFloat(document.getElementById('op-val').value);
  if(isNaN(val) || val <= 0) return;

  if(type === 'in') {
    solde += val;
    alert("Remboursement de " + val + "€ ajouté au solde !");
  } else {
    solde -= val;
    alert("Dépense de " + val + "€ déduite du solde !");
  }
  
  document.getElementById('total-solde').textContent = solde.toFixed(2).replace('.', ',') + " €";
  document.getElementById('op-val').value = '';
}

// SPLASH SCREEN AU DEMARRAGE
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('lock').style.display = 'flex';
    }, 500);
  }, 2000);
});
</script>
</body>
</html>
