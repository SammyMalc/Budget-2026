<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sam'Sou — Gestion Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500;700&display=swap');
:root{--bg:#0f0f11;--surface:#1a1a1f;--surface2:#222228;--border:rgba(255,255,255,0.08);--text:#f0f0f2;--muted:#888896;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--radius:18px;--nav-h:65px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;}
.pages{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.page{display:none;} .page.active{display:block;}

/* LOCK & SPLASH */
#splash, #lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#splash.fade{opacity:0;pointer-events:none;transition:0.5s;}
.splash-logo, .lock-logo{width:100px;height:100px;border-radius:25px;object-fit:cover;margin-bottom:20px;box-shadow:0 8px 25px rgba(0,0,0,0.4);}
.lock-dots{display:flex;gap:15px;margin:30px 0;}
.lock-dot{width:15px;height:15px;border-radius:50%;border:2px solid #333;}
.lock-dot.filled{background:var(--blue);border-color:var(--blue);box-shadow:0 0 10px var(--blue);}
.numpad{display:grid;grid-template-columns:repeat(3,80px);gap:15px;}
.num-btn{width:75px;height:75px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:white;font-size:24px;display:flex;align-items:center;justify-content:center;}
.num-btn:active{background:var(--surface2);}

/* DASHBOARD & REMBOURSEMENT */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:15px;}
.balance-val{font-size:36px;font-family:'DM Mono';font-weight:700;text-align:center;margin:10px 0;}
.op-box{display:flex;flex-direction:column;gap:10px;}
.op-row{display:flex;gap:8px;}
input, select{background:var(--surface2);border:1px solid var(--border);color:white;padding:12px;border-radius:12px;font-size:14px;outline:none;min-width:0;font-family:'DM Sans',sans-serif;}

/* FIX FINAL CHARGES (PIXEL 10 PRO) */
.charges-card{background:var(--surface);border-left:4px solid var(--red);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.charges-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.charges-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;}
.charges-val{font-family:'DM Mono';font-weight:700;flex-shrink:0;}
.charges-add-group{display:flex;gap:8px;width:100%;margin-top:10px;}
.charges-add-group input[type="text"]{flex:2;}
.charges-add-group input[type="number"]{flex:1;}
.btn-add-charge{background:var(--red);color:white;border:none;width:45px;border-radius:12px;font-weight:700;font-size:20px;flex-shrink:0;}

/* NAVIGATION */
.nav{position:fixed;bottom:0;
